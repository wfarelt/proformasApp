{% extends 'core/index.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="card mt-3">
    <div class="card-header"><h3>{{ title }}</h3></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
            <a href="{% url 'cash_register_list' %}" class="btn btn-secondary btn-sm">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
